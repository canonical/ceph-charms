name: ceph-mon
summary: Highly scalable distributed storage
maintainer: OpenStack Charmers <openstack-charmers@lists.ubuntu.com>
description: |
  Ceph is a distributed storage and network file system designed to provide
  excellent performance, reliability, and scalability.
docs: https://discourse.charmhub.io/t/ceph-mon-docs-index/10544
tags:
- openstack
- storage
- file-servers
- misc
series:
- focal
- jammy
peers:
  mon:
    interface: ceph
extra-bindings:
  public:
  cluster:
provides:
  nrpe-external-master:
    interface: nrpe-external-master
    scope: container
    optional: true
  mds:
    interface: ceph-mds
    optional: true
  admin:
    interface: ceph-admin
  client:
    interface: ceph-client
  osd:
    interface: ceph-osd
  radosgw:
    interface: ceph-radosgw
    optional: true
  rbd-mirror:
    interface: ceph-rbd-mirror
    optional: true
  prometheus:
    interface: http
    optional: true
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true
  dashboard:
    interface: ceph-dashboard
    optional: true
  cos-agent:
    interface: cos_agent
    optional: true

requires:
  # DEPRECATED: The bootstrap-source relation is deprecated and will be
  # removed in the Umbrella release.
  bootstrap-source:
    interface: ceph-bootstrap
    optional: true
resources:
  alert-rules:
    type: file
    filename: alert.yaml.rules
    description: Alerting rules
